<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Rápido</title>
    <link rel="stylesheet" href="/estilos.css">
    <!-- Lector ligero y rápido solo para códigos de barras -->
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
</head>
<body>
    <div class="contenedor">
        <header>
            <h1>📦 SISTEMA DE INVENTARIO</h1>
            <p>Escaneo rápido y clasificación</p>
        </header>

        <div class="enlaces">
            <a href="https://sheets.google.com" target="_blank" class="boton azul">📊 Ir a Google</a>
        </div>

        <div class="panel">
            <h2>📸 Escanear Código</h2>
            <!-- Recuadro pequeño y fijo -->
            <div class="marco-camara">
                <video id="camara" autoplay playsinline muted></video>
                <div class="guia">▭▭▭▭▭▭▭</div>
            </div>

            <div class="controles">
                <button id="btnAbrir" class="boton verde">Abrir Cámara</button>
                <button id="btnDetener" class="boton gris" style="display:none;">Detener</button>
            </div>

            <div id="codigoLeido" class="resultado">Código: —</div>
        </div>

        <div id="panelTipo" class="panel oculto">
            <h3>📋 Seleccione tipo</h3>
            <div class="opciones">
                <button onclick="enviar('Perfume')" class="boton tipo">Perfume</button>
                <button onclick="enviar('Crema')" class="boton tipo">Crema</button>
                <button onclick="enviar('Maquillaje')" class="boton tipo">Maquillaje</button>
                <button onclick="enviar('Líquido')" class="boton tipo">Líquido</button>
            </div>
            <div id="estado" class="estado"></div>
            <div class="contador">En lista: <span id="contador">0</span>/10</div>
        </div>

        <script>
            let codigoActual = "";
            let lector = null;
            let activo = false;

            // Solo leer códigos de barras lineales (los de números)
            const formatosPermitidos = [
                ZXing.BarcodeFormat.CODE_128,
                ZXing.BarcodeFormat.CODE_39,
                ZXing.BarcodeFormat.EAN_8,
                ZXing.BarcodeFormat.EAN_13,
                ZXing.BarcodeFormat.UPC_A,
                ZXing.BarcodeFormat.UPC_E,
                ZXing.BarcodeFormat.ITF
            ];

            async function iniciarEscaneo() {
                if (activo) return;
                activo = true;
                codigoActual = "";
                document.getElementById('codigoLeido').textContent = "📡 Apunte el código al recuadro";

                try {
                    lector = new ZXing.BrowserMultiFormatReader();
                    lector.timeBetweenDecodingAttempts = 200; // Más rápido
                    lector.hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formatosPermitidos);

                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment", width: 480, height: 360 }
                    });

                    document.getElementById('camara').srcObject = stream;
                    document.getElementById('btnAbrir').style.display = "none";
                    document.getElementById('btnDetener').style.display = "inline-block";

                    lector.decodeFromVideoDevice(null, 'camara', (res, err) => {
                        if (res) {
                            const texto = res.text.trim();
                            // Solo aceptar si es todo números
                            if (/^\d+$/.test(texto)) {
                                codigoActual = texto;
                                document.getElementById('codigoLeido').innerHTML = `✅ Código: <strong>${codigoActual}</strong>`;
                                document.getElementById('panelTipo').classList.remove('oculto');
                                detenerEscaneo();
                            }
                        }
                    });

                } catch (e) {
                    activo = false;
                    document.getElementById('codigoLeido').textContent = "❌ Error: Permiso denegado";
                }
            }

            function detenerEscaneo() {
                if (lector) lector.reset();
                const stream = document.getElementById('camara').srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                activo = false;
                document.getElementById('btnAbrir').style.display = "inline-block";
                document.getElementById('btnDetener').style.display = "none";
            }

            async function enviar(tipo) {
                if (!codigoActual) return;
                const resp = await fetch('/registrar', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ codigo: codigoActual, tipo: tipo })
                });
                const datos = await resp.json();
                document.getElementById('estado').textContent = datos.mensaje;
                document.getElementById('contador').textContent = datos.contador;
                document.getElementById('panelTipo').classList.add('oculto');
                document.getElementById('codigoLeido').textContent = "✅ Listo para escanear otro";
                setTimeout(() => document.getElementById('estado').textContent = "", 2500);
            }

            document.getElementById('btnAbrir').addEventListener('click', iniciarEscaneo);
            document.getElementById('btnDetener').addEventListener('click', detenerEscaneo);
        </script>
    </div>
</body>
</html>
