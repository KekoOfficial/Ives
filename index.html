<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Productos</title>
    <link rel="stylesheet" href="/estilos.css">
    <!-- Librería que lee códigos de barras y QR -->
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.js"></script>
</head>
<body>
    <div class="contenedor">
        <header>
            <h1>📦 SISTEMA DE INVENTARIO</h1>
            <p>Escaneo, clasificación y envío automático</p>
        </header>

        <div class="enlaces">
            <a href="https://www.google.com" target="_blank" class="boton enlace">🌐 Ir a Google</a>
        </div>

        <div class="panel">
            <h2>📸 Escanear Código</h2>
            <!-- Tamaño reducido para enfocar mejor -->
            <div class="camara-contenedor">
                <video id="camara" autoplay playsinline muted></video>
            </div>
            <canvas id="lienzo" style="display:none;"></canvas>
            
            <div class="controles">
                <button id="btnAbrir" class="boton verde">Abrir Cámara</button>
                <button id="btnEscanear" class="boton azul" disabled>Escanear</button>
            </div>
            <div id="codigoLeido" class="resultado">Código: —</div>
        </div>

        <div id="panelTipo" class="panel oculto">
            <h3>📋 Seleccione el tipo de producto</h3>
            <div class="opciones">
                <button onclick="enviar('Perfume')" class="boton naranja">Perfume</button>
                <button onclick="enviar('Crema')" class="boton naranja">Crema</button>
                <button onclick="enviar('Maquillaje')" class="boton naranja">Maquillaje</button>
                <button onclick="enviar('Líquido')" class="boton naranja">Líquido</button>
            </div>
            <div id="estado" class="estado"></div>
            <div class="contador">Productos en lista: <span id="contador">0</span>/10</div>
        </div>

        <script>
            let codigoActual = "";
            let codigoLector = null;
            const video = document.getElementById('camara');

            async function abrirCamara() {
                try {
                    // Iniciar lector de códigos
                    codigoLector = new ZXing.BrowserMultiFormatReader();
                    
                    // Tamaño reducido y cámara trasera
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "environment",
                            width: { ideal: 640 },
                            height: { ideal: 360 }
                        }
                    });
                    video.srcObject = stream;

                    // Escaneo automático continuo
                    codigoLector.decodeFromVideoDevice(null, 'camara', (resultado, error) => {
                        if (resultado) {
                            codigoActual = resultado.text.trim();
                            document.getElementById('codigoLeido').textContent = `✅ Código: ${codigoActual}`;
                            document.getElementById('panelTipo').classList.remove('oculto');
                        }
                        if (error && !(error instanceof ZXing.NotFoundException)) {
                            document.getElementById('codigoLeido').textContent = "❌ No se detectó código";
                        }
                    });

                    document.getElementById('btnEscanear').disabled = false;
                    document.getElementById('codigoLeido').textContent = "✅ Apunte el código al recuadro";

                } catch (err) {
                    document.getElementById('codigoLeido').textContent = "❌ Permiso denegado o error: " + err.message;
                }
            }

            document.getElementById('btnAbrir').addEventListener('click', abrirCamara);

            async function enviar(tipo) {
                if (!codigoActual) return;
                
                const respuesta = await fetch('/registrar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ codigo: codigoActual, tipo: tipo })
                });
                const datos = await respuesta.json();
                
                document.getElementById('estado').textContent = datos.mensaje;
                document.getElementById('contador').textContent = datos.contador;
                
                // Limpiar para siguiente
                codigoActual = "";
                document.getElementById('codigoLeido').textContent = "✅ Listo para nuevo código";
                document.getElementById('panelTipo').classList.add('oculto');
                setTimeout(() => document.getElementById('estado').textContent = "", 3000);
            }
        </script>
    </div>
</body>
</html>
